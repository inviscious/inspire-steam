<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module03: Audio Video</title>
</head>
<body>
    <!--
        controls- Allow the user to play, pause, etc
        src- the path to the file
        -->
        <h2>Listen in</h2>
        <audio src="./Assets/audio/audio1.mp3" controls>
            Your browser does not support this format
        </audio>
        <video src="./Assets/video/sagiri.mp4" controls>
            Your browser does not support this format
        </video>
</body>
    <!--
        Embed another website's content
        within your website
        
        Attributes:
        scr- link to the resource online
        width, height - suze of the window (pixels)
        title- people with screen readers
        allow full dcreen- let the user go full screen-->
</html>
